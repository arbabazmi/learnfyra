name: CI

on:
  pull_request:
    branches: [main, develop, staging]
  push:
    branches: [main, develop, staging]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run all tests (unit + integration)
        run: npm test
        env:
          NODE_ENV: test
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder

      - name: Coverage gate
        run: |
          npm run test:coverage -- \
            --coverageThreshold='{"global":{"statements":70,"branches":60,"functions":72,"lines":71}}'

  cdk-synth:
    name: CDK Synth (dry run)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install app dependencies (needed by esbuild when bundling Lambdas)
        run: npm ci

      - name: Install CDK dependencies
        run: cd infra/cdk && npm ci

      - name: CDK synth — dev
        run: cd infra/cdk && npx --package=aws-cdk@2.130.0 cdk synth --context env=dev
        env:
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: 'us-east-1'
          JSII_SILENCE_WARNING_DEPRECATED_NODE_VERSION: '1'

      - name: CDK tests
        run: cd infra/cdk && npm test
