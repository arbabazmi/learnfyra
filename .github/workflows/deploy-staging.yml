name: Deploy — Staging

on:
  push:
    branches: [staging]

permissions:
  id-token: write   # required for OIDC token request
  contents: read

jobs:
  test:
    name: Tests (must pass before deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Coverage gate (≥80%)
        run: |
          npm run test:coverage -- \
            --coverageThreshold='{"global":{"statements":80,"branches":80,"functions":80,"lines":80}}'

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Write Anthropic API key to SSM
        run: |
          aws ssm put-parameter \
            --name "/edusheet/staging/anthropic-api-key" \
            --value "${{ secrets.ANTHROPIC_API_KEY_STAGING }}" \
            --type SecureString \
            --overwrite \
            --region ${{ vars.AWS_REGION }}

      - name: Install CDK dependencies
        run: cd infra/cdk && npm ci

      - name: CDK Bootstrap (safe to re-run)
        run: |
          cd infra/cdk
          npx cdk bootstrap \
            aws://${{ vars.AWS_ACCOUNT_ID }}/${{ vars.AWS_REGION }} \
            --context env=staging
        env:
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

      - name: Deploy CDK stack — staging
        run: |
          cd infra/cdk
          npx cdk deploy --context env=staging \
            --require-approval never \
            --outputs-file cdk-outputs.json
        env:
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

      - name: Extract CDK outputs
        id: cdk-outputs
        run: |
          FRONTEND_BUCKET=$(jq -r '.["EduSheetAiStack-staging"]["FrontendBucketName"]' infra/cdk/cdk-outputs.json)
          DIST_ID=$(jq -r '.["EduSheetAiStack-staging"]["DistributionId"]' infra/cdk/cdk-outputs.json)
          CLOUDFRONT_URL=$(jq -r '.["EduSheetAiStack-staging"]["CloudFrontUrl"]' infra/cdk/cdk-outputs.json)
          echo "frontend_bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "dist_id=$DIST_ID" >> $GITHUB_OUTPUT
          echo "cloudfront_url=$CLOUDFRONT_URL" >> $GITHUB_OUTPUT

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/ s3://${{ steps.cdk-outputs.outputs.frontend_bucket }}/ \
            --delete \
            --region ${{ vars.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cdk-outputs.outputs.dist_id }} \
            --paths "/*"

      - name: Print staging URL
        run: echo "Staging deployed at ${{ steps.cdk-outputs.outputs.cloudfront_url }}"
