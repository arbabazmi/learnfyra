name: Full Deploy — Production

on:
  workflow_dispatch:
    inputs:
      local_validation_evidence:
        description: "Required summary or link proving local validation passed"
        required: true
        type: string
      dev_run_id:
        description: "Required workflow run ID from Full Deploy — Dev that succeeded"
        required: true
        type: string

permissions:
  id-token: write   # required for OIDC token request
  contents: read

jobs:
  verify-dev-promotion:
    name: Verify local evidence and successful dev deploy
    runs-on: ubuntu-latest
    steps:
      - name: Validate local evidence input
        run: |
          if [ -z "${{ github.event.inputs.local_validation_evidence }}" ]; then
            echo "Missing local validation evidence."
            exit 1
          fi

      - name: Validate dev workflow run ID format
        run: |
          if ! [[ "${{ github.event.inputs.dev_run_id }}" =~ ^[0-9]+$ ]]; then
            echo "dev_run_id must be numeric."
            exit 1
          fi

      - name: Verify referenced dev deploy run succeeded
        env:
          GH_TOKEN: ${{ github.token }}
          DEV_RUN_ID: ${{ github.event.inputs.dev_run_id }}
        run: |
          RESPONSE=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/actions/runs/${DEV_RUN_ID}")
          NAME=$(echo "$RESPONSE" | jq -r '.name // empty')
          CONCLUSION=$(echo "$RESPONSE" | jq -r '.conclusion // empty')

          if [ "$NAME" != "Full Deploy — Dev" ]; then
            echo "Referenced run is not from Full Deploy — Dev. Found: $NAME"
            exit 1
          fi

          if [ "$CONCLUSION" != "success" ]; then
            echo "Referenced dev deploy run is not successful. Conclusion: $CONCLUSION"
            exit 1
          fi

          echo "Promotion guardrail check passed."

  test:
    name: Tests (must pass before deploy)
    runs-on: ubuntu-latest
    needs: verify-dev-promotion
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: tests
        run: |
          set +e
          npx cross-env NODE_OPTIONS=--experimental-vm-modules npx jest --ci --json --outputFile=test-results.json 2>&1 | tee test-output.txt
          TEST_EXIT=$?
          set -e

          # Parse results
          if [ -f test-results.json ]; then
            TOTAL=$(jq '.numTotalTests' test-results.json)
            PASSED=$(jq '.numPassedTests' test-results.json)
            FAILED=$(jq '.numFailedTests' test-results.json)
            SUITES=$(jq '.numTotalTestSuites' test-results.json)
            SUITE_FAIL=$(jq '.numFailedTestSuites' test-results.json)
          else
            TOTAL=0; PASSED=0; FAILED=0; SUITES=0; SUITE_FAIL=0
          fi

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "suites=$SUITES" >> $GITHUB_OUTPUT
          echo "suite_fail=$SUITE_FAIL" >> $GITHUB_OUTPUT

          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║         TEST RESULTS SUMMARY             ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  Total:   $TOTAL tests in $SUITES suites"
          echo "║  Passed:  $PASSED ✓"
          echo "║  Failed:  $FAILED ✗"
          echo "║  Suites:  $SUITE_FAIL failed / $SUITES total"
          echo "╚══════════════════════════════════════════╝"
          echo ""

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED test(s) failed out of $TOTAL"
            jq -r '.testResults[] | select(.status == "failed") | .testResults[] | select(.status == "failed") | "  ✗ " + .fullName' test-results.json 2>/dev/null || true
          fi

          exit $TEST_EXIT

      - name: Test Summary
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | ${{ steps.tests.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | ${{ steps.tests.outputs.passed }} ✓ |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | ${{ steps.tests.outputs.failed }} ✗ |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suites | ${{ steps.tests.outputs.suites }} (${{ steps.tests.outputs.suite_fail }} failed) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  approve:
    name: Manual Approval Required
    runs-on: ubuntu-latest
    needs: test
    environment: production   # GitHub environment with required reviewers configured

    steps:
      - name: Approval gate
        run: echo "Production deployment approved — proceeding."

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approve

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set deploy version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSION="prod-${SHORT_SHA}-$(date -u +%Y%m%d%H%M%S)"
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║         DEPLOY VERSION                   ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  Version:   $VERSION"
          echo "║  Commit:    $SHORT_SHA"
          echo "║  Branch:    ${{ github.ref_name }}"
          echo "║  Timestamp: $TIMESTAMP"
          echo "║  Actor:     ${{ github.actor }}"
          echo "╚══════════════════════════════════════════╝"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Write Anthropic API key to SSM
        run: |
          aws ssm put-parameter \
            --name "/learnfyra/prod/anthropic-api-key" \
            --value "${{ secrets.ANTHROPIC_API_KEY_PROD }}" \
            --type SecureString \
            --overwrite \
            --region ${{ vars.AWS_REGION }}

      - name: Write JWT secret to Secrets Manager
        run: |
          aws secretsmanager describe-secret \
            --secret-id "/learnfyra/prod/jwt-secret" \
            --region ${{ vars.AWS_REGION }} > /dev/null 2>&1 \
          && aws secretsmanager update-secret \
            --secret-id "/learnfyra/prod/jwt-secret" \
            --secret-string "${{ secrets.JWT_SECRET_PROD }}" \
            --region ${{ vars.AWS_REGION }} \
          || aws secretsmanager create-secret \
            --name "/learnfyra/prod/jwt-secret" \
            --description "JWT signing secret for Learnfyra prod" \
            --secret-string "${{ secrets.JWT_SECRET_PROD }}" \
            --region ${{ vars.AWS_REGION }}

      - name: Write Google OAuth client secret to Secrets Manager
        run: |
          aws secretsmanager describe-secret \
            --secret-id "/learnfyra/prod/google-client-secret" \
            --region ${{ vars.AWS_REGION }} > /dev/null 2>&1 \
          && aws secretsmanager update-secret \
            --secret-id "/learnfyra/prod/google-client-secret" \
            --secret-string "${{ secrets.GOOGLE_CLIENT_SECRET_PROD }}" \
            --region ${{ vars.AWS_REGION }} \
          || aws secretsmanager create-secret \
            --name "/learnfyra/prod/google-client-secret" \
            --description "Google OAuth client secret for Learnfyra production" \
            --secret-string "${{ secrets.GOOGLE_CLIENT_SECRET_PROD }}" \
            --region ${{ vars.AWS_REGION }}

      - name: Install app dependencies (needed by esbuild when bundling Lambdas)
        run: npm ci

      - name: Build Vite frontend (prod)
        run: |
          cd learnfyra-app
          npm ci
          npm run build

      - name: Install CDK dependencies
        run: cd infra/cdk && npm ci

      - name: Deploy CDK stack — prod
        run: |
          cd infra/cdk
          npx cdk deploy \
            --context env=prod \
            --context enableCustomDomains=true \
            --context rootDomainName=learnfyra.com \
            --context hostedZoneId=Z027880820G9W7LYJRE7H \
            --context cloudFrontCertificateArn=arn:aws:acm:us-east-1:796929287685:certificate/abb068ee-3a48-4546-bb30-b494d7fe1ea7 \
            --context apiCertificateArn=arn:aws:acm:us-east-1:796929287685:certificate/abb068ee-3a48-4546-bb30-b494d7fe1ea7 \
            --require-approval never \
            --outputs-file cdk-outputs.json
        env:
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

      - name: Extract CDK outputs
        id: cdk-outputs
        run: |
          FRONTEND_BUCKET=$(jq -r '.["LearnfyraStack-prod"]["FrontendBucketName"]' infra/cdk/cdk-outputs.json)
          DIST_ID=$(jq -r '.["LearnfyraStack-prod"]["DistributionId"]' infra/cdk/cdk-outputs.json)
          FRONTEND_URL=$(jq -r '.["LearnfyraStack-prod"]["FrontendUrl"]' infra/cdk/cdk-outputs.json)
          echo "frontend_bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "dist_id=$DIST_ID" >> $GITHUB_OUTPUT
          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          API_URL=$(jq -r '.["LearnfyraStack-prod"]["ApiUrl"]' infra/cdk/cdk-outputs.json)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Sync frontend to S3
        run: |
          aws s3 sync learnfyra-app/dist/ s3://${{ steps.cdk-outputs.outputs.frontend_bucket }}/ \
            --delete \
            --region ${{ vars.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cdk-outputs.outputs.dist_id }} \
            --paths "/*"

      - name: Tag Lambda functions with deploy version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHORT_SHA="${{ steps.version.outputs.short_sha }}"
          TIMESTAMP="${{ steps.version.outputs.timestamp }}"

          LAMBDAS=$(aws lambda list-functions \
            --query "Functions[?starts_with(FunctionName, 'learnfyra-prod-')].FunctionName" \
            --output text)

          echo "Tagging Lambda functions with version: $VERSION"
          for FN in $LAMBDAS; do
            aws lambda tag-resource \
              --resource $(aws lambda get-function --function-name "$FN" --query 'Configuration.FunctionArn' --output text) \
              --tags "DeployVersion=$VERSION,DeployCommit=$SHORT_SHA,DeployTimestamp=$TIMESTAMP,DeployedBy=${{ github.actor }}"
            echo "  ✓ $FN"
          done

      - name: Smoke check production routes
        id: smoke
        run: |
          set -euo pipefail
          BASE_API="${{ steps.cdk-outputs.outputs.api_url }}api"
          PASS=0
          FAIL=0
          RESULTS=""

          check() {
            METHOD="$1"; NAME="$2"; URL="$3"; BODY="${4:-}"
            if [ "$METHOD" = "GET" ]; then
              CODE=$(curl -sS -o /dev/null -w "%{http_code}" "$URL")
            else
              CODE=$(curl -sS -o /dev/null -w "%{http_code}" -X "$METHOD" "$URL" -H "Content-Type: application/json" -d "$BODY")
            fi

            if [[ "$CODE" =~ ^5 ]]; then
              FAIL=$((FAIL + 1))
              RESULTS="$RESULTS\n  ✗ $NAME → $CODE"
            else
              PASS=$((PASS + 1))
              RESULTS="$RESULTS\n  ✓ $NAME → $CODE"
            fi
          }

          check POST "auth/register" "$BASE_API/auth/register" '{"email":"smoke+prod@learnfyra.com","password":"SmokePass123!"}'
          check POST "auth/login" "$BASE_API/auth/login" '{"email":"smoke+prod@learnfyra.com","password":"SmokePass123!"}'
          check POST "auth/logout" "$BASE_API/auth/logout" '{}'
          check POST "auth/guest" "$BASE_API/auth/guest" '{"role":"student"}'
          check GET  "guest/preview?role=teacher" "$BASE_API/guest/preview?role=teacher"
          check GET  "solve/{worksheetId}" "$BASE_API/solve/smoke-worksheet-id"
          check POST "submit" "$BASE_API/submit" '{"worksheetId":"smoke-worksheet-id","answers":[]}'
          check GET  "progress/history" "$BASE_API/progress/history"
          check GET  "student/profile" "$BASE_API/student/profile"
          check GET  "rewards/student/{id}" "$BASE_API/rewards/student/smoke"

          TOTAL=$((PASS + FAIL))
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║         SMOKE TEST RESULTS               ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  Total:   $TOTAL endpoints"
          echo "║  Passed:  $PASS ✓ (no 5xx)"
          echo "║  Failed:  $FAIL ✗ (5xx errors)"
          echo "╚══════════════════════════════════════════╝"
          echo -e "$RESULTS"

          echo "smoke_pass=$PASS" >> $GITHUB_OUTPUT
          echo "smoke_fail=$FAIL" >> $GITHUB_OUTPUT
          echo "smoke_total=$TOTAL" >> $GITHUB_OUTPUT

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL endpoint(s) returned 5xx errors"
            exit 1
          fi

      - name: Deploy Summary
        if: always()
        run: |
          echo "### Deploy Summary — Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ steps.version.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | ${{ steps.version.outputs.timestamp }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ steps.cdk-outputs.outputs.frontend_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ steps.cdk-outputs.outputs.api_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Smoke Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoints Tested | ${{ steps.smoke.outputs.smoke_total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | ${{ steps.smoke.outputs.smoke_pass }} ✓ |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | ${{ steps.smoke.outputs.smoke_fail }} ✗ |" >> $GITHUB_STEP_SUMMARY
