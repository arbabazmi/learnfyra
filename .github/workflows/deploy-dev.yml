name: Deploy — Dev

on:
  push:
    branches: [develop]

permissions:
  id-token: write   # required for OIDC token request
  contents: read

jobs:
  test:
    name: Tests (must pass before deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: test
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Write Anthropic API key to SSM
        run: |
          aws ssm put-parameter \
            --name "/edusheet/dev/anthropic-api-key" \
            --value "${{ secrets.ANTHROPIC_API_KEY_DEV }}" \
            --type SecureString \
            --overwrite \
            --region ${{ vars.AWS_REGION }}

      - name: Install CDK dependencies
        run: cd infra/cdk && npm ci

      - name: CDK Bootstrap (safe to re-run)
        run: |
          cd infra/cdk
          npx cdk bootstrap \
            aws://${{ vars.AWS_ACCOUNT_ID }}/${{ vars.AWS_REGION }} \
            --context env=dev
        env:
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

      - name: Deploy CDK stack — dev
        run: |
          cd infra/cdk
          npx cdk deploy --context env=dev \
            --require-approval never \
            --outputs-file cdk-outputs.json
        env:
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

      - name: Extract CDK outputs
        id: cdk-outputs
        run: |
          FRONTEND_BUCKET=$(jq -r '.["EduSheetAiStack-dev"]["FrontendBucketName"]' infra/cdk/cdk-outputs.json)
          DIST_ID=$(jq -r '.["EduSheetAiStack-dev"]["DistributionId"]' infra/cdk/cdk-outputs.json)
          CLOUDFRONT_URL=$(jq -r '.["EduSheetAiStack-dev"]["CloudFrontUrl"]' infra/cdk/cdk-outputs.json)
          echo "frontend_bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "dist_id=$DIST_ID" >> $GITHUB_OUTPUT
          echo "cloudfront_url=$CLOUDFRONT_URL" >> $GITHUB_OUTPUT

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/ s3://${{ steps.cdk-outputs.outputs.frontend_bucket }}/ \
            --delete \
            --region ${{ vars.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cdk-outputs.outputs.dist_id }} \
            --paths "/*"

      - name: Print dev URL
        run: echo "Dev deployed at ${{ steps.cdk-outputs.outputs.cloudfront_url }}"
