<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Learnfyra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

  <div class="bg-orb bg-orb--one" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--two" aria-hidden="true"></div>

  <!-- ============================================================
       Site Header
       ============================================================ -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <a href="/" class="logo" aria-label="Learnfyra home">
          <span class="logo-icon" aria-hidden="true">&#9998;</span>
          <span class="logo-text">Learn<span class="logo-accent">fyra</span></span>
        </a>
        <p class="header-tagline">USA curriculum-aligned worksheets for Grades 1–10</p>
      </div>
    </div>
  </header>

  <!-- ============================================================
       Auth Card
       ============================================================ -->
  <main class="auth-page-main" id="authPageMain">
    <div class="auth-card" role="main" aria-label="Sign in or create an account">

      <h1 class="auth-card-title">Welcome to Learnfyra</h1>
      <p class="auth-card-sub">Sign in to track progress, save worksheets, and more.</p>

      <!-- Tab Toggle -->
      <div class="tab-group" role="tablist" aria-label="Authentication options">
        <button
          class="tab-btn tab-btn--active"
          role="tab"
          aria-selected="true"
          aria-controls="signInForm"
          data-tab="signin"
          id="tabSignIn"
          type="button"
        >Sign In</button>
        <button
          class="tab-btn"
          role="tab"
          aria-selected="false"
          aria-controls="createAccountForm"
          data-tab="register"
          id="tabRegister"
          type="button"
        >Create Account</button>
      </div>

      <!-- --------------------------------------------------------
           Sign In Form
           -------------------------------------------------------- -->
      <form
        id="signInForm"
        class="auth-form"
        novalidate
        aria-label="Sign in form"
        role="tabpanel"
        aria-labelledby="tabSignIn"
      >

        <div class="form-group">
          <label class="form-label" for="loginEmail">
            Email <span class="required" aria-hidden="true">*</span>
          </label>
          <input
            id="loginEmail"
            name="loginEmail"
            type="email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
            aria-required="true"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">
            Password <span class="required" aria-hidden="true">*</span>
          </label>
          <input
            id="loginPassword"
            name="loginPassword"
            type="password"
            class="form-input"
            placeholder="Your password"
            autocomplete="current-password"
            required
            aria-required="true"
          />
        </div>

        <div
          id="loginError"
          class="auth-error"
          role="alert"
          aria-live="polite"
          hidden
        ></div>

        <button
          type="submit"
          id="signInBtn"
          class="btn btn--primary"
          style="width:100%;justify-content:center;"
        >
          Sign In
        </button>

      </form>

      <!-- --------------------------------------------------------
           Create Account Form
           -------------------------------------------------------- -->
      <form
        id="createAccountForm"
        class="auth-form"
        novalidate
        aria-label="Create account form"
        role="tabpanel"
        aria-labelledby="tabRegister"
        hidden
      >

        <div class="form-group">
          <label class="form-label" for="regDisplayName">
            Display Name <span class="required" aria-hidden="true">*</span>
          </label>
          <input
            id="regDisplayName"
            name="regDisplayName"
            type="text"
            class="form-input"
            placeholder="e.g., Alex Johnson"
            autocomplete="name"
            required
            aria-required="true"
            maxlength="80"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="regEmail">
            Email <span class="required" aria-hidden="true">*</span>
          </label>
          <input
            id="regEmail"
            name="regEmail"
            type="email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
            aria-required="true"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="regPassword">
            Password <span class="required" aria-hidden="true">*</span>
          </label>
          <input
            id="regPassword"
            name="regPassword"
            type="password"
            class="form-input"
            placeholder="Minimum 8 characters"
            autocomplete="new-password"
            required
            aria-required="true"
            minlength="8"
          />
          <span class="field-hint">At least 8 characters required.</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="regRole">
            I am a… <span class="required" aria-hidden="true">*</span>
          </label>
          <select
            id="regRole"
            name="regRole"
            class="form-select"
            required
            aria-required="true"
          >
            <option value="">Select your role…</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="parent">Parent</option>
          </select>
        </div>

        <div
          id="registerError"
          class="auth-error"
          role="alert"
          aria-live="polite"
          hidden
        ></div>

        <button
          type="submit"
          id="createAccountBtn"
          class="btn btn--primary"
          style="width:100%;justify-content:center;"
        >
          Create Account
        </button>

      </form>

      <!-- --------------------------------------------------------
           Social Login
           -------------------------------------------------------- -->
      <div class="auth-divider" aria-hidden="true">or sign in with</div>

      <a
        href="/api/auth/oauth/google"
        class="btn btn--google"
        aria-label="Sign in with Google"
      >
        <span class="google-icon" aria-hidden="true"></span>
        Continue with Google
      </a>

      <!-- --------------------------------------------------------
           Back to Home
           -------------------------------------------------------- -->
      <a href="/" class="auth-back" aria-label="Return to Learnfyra home page">
        &#8592; Back to Home
      </a>

    </div><!-- /.auth-card -->
  </main>

  <!-- ============================================================
       Footer
       ============================================================ -->
  <footer class="site-footer">
    <div class="container">
      <p class="footer-text">Learnfyra &mdash; Aligned to CCSS, NGSS, and NHES standards</p>
    </div>
  </footer>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
